# ─────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────
server.port=8080

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

spring.config.import=optional:file:./.env[.properties],optional:file:./application-local.properties

# ─────────────────────────────────────────────
# Database
# ─────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/triggerx}
spring.datasource.username=${DB_USERNAME:triggerx}
spring.datasource.password=${DB_PASSWORD:triggerx}

# Hibernate validates schema only — Flyway owns all DDL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─────────────────────────────────────────────
# Flyway
# ─────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.aop.proxy-target-class=true

# ─────────────────────────────────────────────
# JWT
# ─────────────────────────────────────────────
jwt.secret=${JWT_SECRET:}
jwt.expiry.seconds=2592000

# ─────────────────────────────────────────────
# Email (Gmail SMTP)
# ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:placeholder@gmail.com}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─────────────────────────────────────────────
# OTP
# ─────────────────────────────────────────────
otp.expiry.minutes=10
otp.max.attempts=5
otp.rate.limit.per.hour=10

# ─────────────────────────────────────────────
# Alert Limits
# ─────────────────────────────────────────────
alert.max.per.user=50

# ─────────────────────────────────────────────
# CORS
# ─────────────────────────────────────────────
frontend.url=${FRONTEND_URL:http://localhost:3000}

# ─────────────────────────────────────────────
# Telegram Bot 
# ─────────────────────────────────────────────
telegram.bot.enabled=${TELEGRAM_BOT_ENABLED:false}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:TriggerX_AlertBot}
# ─────────────────────────────────────────────
# Spring AI — Groq via OpenAI-compatible endpoint
# ─────────────────────────────────────────────
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=${GROQ_API_KEY:}
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.0
